<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/order.css">
  <link rel="stylesheet" href="css/orders.css">
  <meta name="theme-color" content="#db4938">
  <title>Editar Orden — Cafetería PWA</title>
</head>

<body>
  <main>
    <nav>
      <h1>Cafeteria PWA</h1>
      <a class="order-counter" href="orders.html" title="Volver a mis órdenes">← Órdenes</a>
    </nav>

    <div class="order-container">
      <h2 id="edit-title">Editar orden</h2>
      <p id="edit-subtitle" style="color:#888; margin-bottom:1.5rem; font-size:0.9rem;"></p>

      <form id="edit-form">

        <div class="form-group">
          <label for="size">Tamaño</label>
          <select id="size" name="size">
            <option value="Pequeño">Pequeño (8 oz)</option>
            <option value="Mediano" selected>Mediano (12 oz)</option>
            <option value="Grande">Grande (16 oz)</option>
          </select>
        </div>

        <div class="form-group">
          <label class="checkbox-group">
            <input type="checkbox" id="sugar" name="sugar" />
            <span>Con azúcar</span>
          </label>
        </div>

        <button type="submit" class="btn-submit">💾 Guardar cambios</button>
      </form>

      <div id="edit-result" style="display:none;"></div>
    </div>
  </main>

  <script src="js/edit-order.js"></script>
</body>

</html>
